name: Deploy Dashboard to Hostinger

# Triggers on any push to main, except changes that only touch the backend or docs.
on:
  push:
    branches: [main]
    paths-ignore:
      - 'backend/**'
      - '**.md'
      - '.gitignore'
  # Allows you to manually run the workflow from the Actions tab if you ever need to.
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-dashboard
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # ───────────────────────────────────────────────────────────────────
      # Hostinger's FTP control socket sporadically drops mid-upload with a
      # "Timeout (control socket)" error. Build is always fine, only the
      # upload step fails. We retry up to 3 times with backoff before
      # actually failing the workflow.
      # ───────────────────────────────────────────────────────────────────
      - name: Deploy dist/ via FTP (attempt 1)
        id: ftp1
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ secrets.FTP_TARGET_DIR }}
          state-name: .ftp-deploy-sync-state.json
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

      - name: Wait 20s before retry
        if: steps.ftp1.outcome == 'failure'
        run: sleep 20

      - name: Deploy dist/ via FTP (attempt 2)
        if: steps.ftp1.outcome == 'failure'
        id: ftp2
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ secrets.FTP_TARGET_DIR }}
          state-name: .ftp-deploy-sync-state.json
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

      - name: Wait 45s before final retry
        if: steps.ftp1.outcome == 'failure' && steps.ftp2.outcome == 'failure'
        run: sleep 45

      - name: Deploy dist/ via FTP (attempt 3 — final)
        if: steps.ftp1.outcome == 'failure' && steps.ftp2.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ secrets.FTP_TARGET_DIR }}
          state-name: .ftp-deploy-sync-state.json
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
